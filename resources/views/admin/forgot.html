<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Generate ID Card</title>

    <!-- Bootstrap css -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <!-- Premium Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #f8fbff 0%, #eef4ff 45%, #f4f0ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-wrapper {
            width: 100%;
            padding: 30px 15px;
        }

        .premium-card {
            max-width: 1050px;
            margin: auto;
            border-radius: 26px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 25px 60px rgba(80, 110, 180, 0.18);
            animation: fadeUp 0.7s ease;
        }

        .left-panel {
            background: linear-gradient(145deg, #edf4ff, #f5efff);
            color: #2a1570;
            padding: 60px 40px;
            min-height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-right: 1px solid rgba(42, 21, 112, 0.08);
        }

        .left-panel .branding {
            width: 100%;
        }

        .single-brand-logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 18px 28px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(91, 124, 255, 0.12);
            box-shadow: 0 18px 40px rgba(91, 124, 255, 0.12);
            flex-wrap: nowrap;
        }

        .single-brand-icon {
            width: 72px !important;
            height: 72px !important;
            object-fit: contain;
            padding: 10px !important;
            margin: 0 !important;
            border-radius: 18px;
            background: #ffffff;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.06) !important;
        }

        .single-brand-text {
            font-size: 2.2rem;
            font-weight: 800;
            color: #2a1570;
            letter-spacing: 1px;
            text-transform: uppercase;
            white-space: nowrap;
            line-height: 1;
        }

        .right-panel {
            background: rgba(255, 255, 255, 0.95);
            padding: 60px 45px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100%;
        }

        .page-title {
            color: #1f2a44;
            font-weight: 700;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .page-subtitle {
            color: #7b8190;
            font-size: 14px;
            margin-bottom: 35px;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #2b2b2b;
            display: block;
            font-size: 14px;
        }

        .input-group {
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #dde3f0;
            transition: all 0.3s ease;
            background: #fff;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.03);
        }

        .input-group:focus-within {
            border-color: #4c6fff;
            box-shadow: 0 0 0 4px rgba(76, 111, 255, 0.12);
            transform: translateY(-1px);
        }

        .input-group-text {
            background: #f8faff;
            border: none;
            color: #7a8191;
            padding: 14px 16px;
        }

        .form-control {
            border: none !important;
            box-shadow: none !important;
            padding: 15px 14px;
            font-size: 15px;
            background: #fff;
        }

        .form-control::placeholder {
            color: #a0a7b4;
        }

        .btn-premium {
            background: linear-gradient(135deg, #5b7cff, #7b5cff);
            color: #fff;
            border: none;
            border-radius: 16px;
            padding: 13px 28px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 12px 28px rgba(91, 124, 255, 0.22);
            width: 100%;
        }

        .btn-premium:hover {
            transform: translateY(-2px);
            color: #fff;
            box-shadow: 0 16px 34px rgba(91, 124, 255, 0.30);
        }

        .btn-soft {
            background: #eef2ff;
            color: #2a1570;
            border: none;
            border-radius: 16px;
            padding: 13px 22px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            width: 100%;
            margin-top: 0;
        }

        .btn-soft:hover {
            background: #dde5ff;
            color: #2a1570;
        }

        .bottom-note {
            margin-top: 28px;
            font-size: 13px;
            color: #7b8190;
            text-align: center;
        }

        .success-message {
            display: none;
            background: #e9f9ef;
            color: #198754;
            padding: 12px 15px;
            border-radius: 14px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .step-two {
            display: none;
            animation: fadeUp 0.4s ease;
        }

        .action-buttons {
            display: flex;
            gap: 14px;
        }

        .action-buttons .btn-premium,
        .action-buttons .btn-soft {
            width: 100%;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(25px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 991px) {
            .left-panel {
                padding: 45px 25px;
            }

            .right-panel {
                padding: 40px 28px;
            }
        }

        @media (max-width: 768px) {
            .single-brand-logo {
                gap: 12px;
                padding: 14px 18px;
            }

            .single-brand-icon {
                width: 56px !important;
                height: 56px !important;
                padding: 8px !important;
            }

            .single-brand-text {
                font-size: 1.4rem;
            }
        }

        @media (max-width: 576px) {
            .page-title {
                font-size: 1.6rem;
            }

            .right-panel {
                padding: 30px 20px;
            }

            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="main-wrapper">
        <div class="premium-card">
            <div class="row g-0">

                <!-- Left Panel -->
                <div class="col-lg-6">
                    <div class="left-panel">
                        <div class="branding">
                            <div class="single-brand-logo">
                                <img src="{{ asset('/theme/images/logoicon2.png') }}" alt="Portal Logo"
                                    class="single-brand-icon">

                                <span class="single-brand-text">Generate ID</span>

                                <img src="{{ asset('/theme/images/logoicon1.png') }}" alt="Portal Logo"
                                    class="single-brand-icon">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right Panel -->
                <div class="col-lg-6">
                    <div class="right-panel">
                        <h3 class="page-title">Forgot Password</h3>
                        <p class="page-subtitle">Enter your email address to receive OTP.</p>

                        <div class="success-message" id="successMessage">
                            Password reset successfully!
                        </div>

                        <form id="resetPasswordForm">

                            <!-- Step 1 -->
                            <div id="stepOne">
                                <div class="form-group">
                                    <label>Email Address</label>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="fa-solid fa-envelope"></i>
                                        </span>
                                        <input id="email" type="email" class="form-control"
                                            placeholder="Enter your email address" required>
                                    </div>
                                </div>

                                <div class="row g-3 mt-2">
                                    <div class="col-6">
                                        <button type="button" class="btn btn-premium w-100" onclick="showResetFields()">
                                            <i class="fa-solid fa-paper-plane me-2"></i> Send OTP
                                        </button>
                                    </div>
                                    <div class="col-6">
                                        <a href="{{ route('login') }}" class="btn btn-soft w-100">
                                            <i class="fa-solid fa-arrow-left me-2"></i> Back to Login
                                        </a>
                                    </div>
                                </div>
                            </div>

                            <!-- Step 2 -->
                            <div id="stepTwo" class="step-two mt-4">
                                <div class="form-group">
                                    <label>OTP</label>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="fa-solid fa-key"></i>
                                        </span>
                                        <input id="otp" type="text" class="form-control" placeholder="Enter OTP"
                                            maxlength="6">
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label>New Password</label>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="fa-solid fa-lock"></i>
                                        </span>
                                        <input id="newPassword" type="password" class="form-control"
                                            placeholder="Enter new password">
                                        <span class="input-group-text" onclick="togglePassword('newPassword', 'icon1')"
                                            style="cursor:pointer;">
                                            <i id="icon1" class="fa-solid fa-eye-slash"></i>
                                        </span>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label>Confirm Password</label>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="fa-solid fa-lock"></i>
                                        </span>
                                        <input id="confirmPassword" type="password" class="form-control"
                                            placeholder="Confirm new password">
                                        <span class="input-group-text"
                                            onclick="togglePassword('confirmPassword', 'icon2')"
                                            style="cursor:pointer;">
                                            <i id="icon2" class="fa-solid fa-eye-slash"></i>
                                        </span>
                                    </div>
                                </div>

                                <div class="d-flex gap-3 mt-3 flex-wrap action-buttons">
                                    <button type="submit" class="btn btn-premium flex-fill">
                                        <i class="fa-solid fa-check me-2"></i> Reset Password
                                    </button>

                                    <a href="{{ route('login') }}" class="btn-soft flex-fill">
                                        <i class="fa-solid fa-arrow-left me-2"></i> Back to Login
                                    </a>
                                </div>
                            </div>

                            <div class="bottom-note">
                                © {{ date('Y') }} Generate ID Card. All rights reserved.
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        function showResetFields() {
            let email = document.getElementById("email").value.trim();

            if (email === "") {
                alert("Please enter email address!");
                return;
            }

            let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(email)) {
                alert("Please enter a valid email address!");
                return;
            }

            document.getElementById("stepTwo").style.display = "block";
        }

        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);

            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            } else {
                input.type = "password";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            }
        }

        document.getElementById("resetPasswordForm").addEventListener("submit", function (e) {
            e.preventDefault();

            let otp = document.getElementById("otp").value.trim();
            let newPassword = document.getElementById("newPassword").value.trim();
            let confirmPassword = document.getElementById("confirmPassword").value.trim();
            let successMessage = document.getElementById("successMessage");

            if (otp === "" || newPassword === "" || confirmPassword === "") {
                alert("Please fill all fields!");
                return;
            }

            if (!/^\d{6}$/.test(otp)) {
                alert("Enter valid 6-digit OTP!");
                return;
            }

            if (newPassword.length < 6) {
                alert("Password must be at least 6 characters!");
                return;
            }

            if (newPassword !== confirmPassword) {
                alert("Passwords do not match!");
                return;
            }

            successMessage.style.display = "block";
            this.reset();
            document.getElementById("stepTwo").style.display = "none";
        });
    </script>

</body>

</html>
